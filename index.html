<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UVM MARKET</title>

<style>
:root{
    --bg:#56070c;
    --card:#ffffff;
    --accent:#e11d48;
    --text:#f1f5f9;
    --sub:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{ background:var(--bg); color:var(--text); }

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#ffffff;
    border-bottom:1px solid #e5e7eb;
}

.logo{ font-size:1.6rem; font-weight:bold; color:var(--accent); }

nav a{
    margin:0 15px;
    text-decoration:none;
    color:#ff0000;
    cursor:pointer;
}

nav a:hover{ color:var(--accent); }

.cart{ cursor:pointer; font-weight:bold; }

.hero{
    padding:80px 40px;
    text-align:center;
}

.container{
    padding:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:12px;
    transition:0.3s;
    border:1px solid #263245;
}

.card:hover{
    transform:translateY(-5px);
    border-color:var(--accent);
}

.product-img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
    margin-bottom:10px;
}

.card h3{ color:var(--accent); }

.price{
    color:var(--accent);
    font-weight:bold;
    margin:8px 0;
}

button{
    background:var(--accent);
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    color:white;
    margin-top:5px;
}

button:hover{ opacity:0.85; }

#cartBox{
    position:fixed;
    right:20px;
    top:80px;
    width:320px;
    max-height:420px;
    overflow:auto;
    background:var(--card);
    padding:15px;
    border-radius:12px;
    border:1px solid var(--accent);
    display:none;
}

.cart-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:0.9rem;
}

.cart-info{
    display:flex;
    align-items:center;
    gap:8px;
}

.cart-img{
    width:40px;
    height:40px;
    object-fit:cover;
    border-radius:6px;
}

.remove-btn{
    background:#444;
    padding:3px 6px;
    font-size:0.8rem;
}

.total{
    margin-top:10px;
    font-weight:bold;
    border-top:1px solid #263245;
    padding-top:8px;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    border-top:1px solid #1e293b;
    color:var(--sub);
}
</style>
</head>

<body>

<header>
    <div class="logo">UVM MARKET</div>
    <nav>
        <a onclick="showHome()">Inicio</a>
        <a onclick="filterCategory('productos')">Productos</a>
        <a onclick="filterCategory('servicios')">Servicios</a>
        <a onclick="filterCategory('comida')">Comida</a>
        <a onclick="filterCategory('ofertas')">Ofertas</a>
    </nav>
    <div class="cart" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</header>

</section>

<section class="container" id="products" style="display:none;"></section>

<div id="cartBox">
    <h3>Carrito</h3>
    <div id="cartItems"></div>
    <div class="total" id="total"></div>
</div>

<footer>
    © 2026 UVM MARKET
</footer>

{name:"Paquete fitness semanal",price:300,category:"ofertas",image:"img/fitness.jpg"}

let cart=[];

function showHome(){
document.getElementById("homeSection").style.display="block";
document.getElementById("products").style.display="none";
}

function filterCategory(cat){
document.getElementById("homeSection").style.display="none";
const container=document.getElementById("products");
container.style.display="grid";
container.innerHTML="";
const filtered=products.filter(p=>p.category===cat);

filtered.forEach((p)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}" class="product-img">
<h3>${p.name}</h3>
<div class="price">$${p.price}</div>
<button onclick="addToCart(${products.indexOf(p)})">Agregar</button>
</div>`;
});
}

function addToCart(index){
cart.push(products[index]);
updateCart();
}

function removeFromCart(i){
cart.splice(i,1);
updateCart();
}

function updateCart(){
const cartDiv=document.getElementById("cartItems");
const totalDiv=document.getElementById("total");
cartDiv.innerHTML="";
let total=0;

cart.forEach((item,i)=>{
total+=item.price;
cartDiv.innerHTML+=`
<div class="cart-item">
<div class="cart-info">
<img src="${item.image}" class="cart-img">
<span>${item.name} - $${item.price}</span>
</div>
<button class="remove-btn" onclick="removeFromCart(${i})">X</button>
</div>`;
});

document.getElementById("count").innerText=cart.length;
totalDiv.innerText="Total: $"+total;
}

function toggleCart(){
const box=document.getElementById("cartBox");
box.style.display=box.style.display==="none"?"block":"none";
}
